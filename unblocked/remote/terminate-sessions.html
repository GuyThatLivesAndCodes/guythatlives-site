<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminate Hyperbeam Sessions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #b0ffbe;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            background: #1a1a1a;
            border: 1px solid #505050;
            border-radius: 0.5rem;
            padding: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #3ff148;
        }

        .info {
            background: rgba(63, 241, 72, 0.1);
            border: 1px solid #3ff148;
            border-radius: 0.375rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #cde1cb;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            background: #252525;
            border: 1px solid #505050;
            border-radius: 0.375rem;
            color: #b0ffbe;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #3ff148;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3ff148, #3bbe56);
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(63, 241, 72, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
        }

        .result.success {
            background: rgba(63, 241, 72, 0.1);
            border: 1px solid #3ff148;
            color: #3ff148;
        }

        .result.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
        }

        .session-list {
            margin-top: 1rem;
        }

        .session-item {
            padding: 0.75rem;
            background: #252525;
            border: 1px solid #505050;
            border-radius: 0.375rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-id {
            font-family: monospace;
            font-size: 0.875rem;
            color: #95b894;
        }

        .kill-btn {
            padding: 0.5rem 1rem;
            background: #ef4444;
            border: none;
            border-radius: 0.25rem;
            color: white;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .kill-btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛑 Terminate Hyperbeam Sessions</h1>

        <div class="info">
            <strong>⚠️ Admin Tool:</strong> This page terminates ALL active Hyperbeam sessions. Use this when sessions are stuck or you need to free up your test quota.
        </div>

        <div class="input-group">
            <label for="apiKey">Hyperbeam API Key</label>
            <input
                type="password"
                id="apiKey"
                placeholder="hb_xxxxxxxxxxxxxxxxxxxxx"
                autocomplete="off"
            >
        </div>

        <button id="listBtn">List Active Sessions</button>

        <div id="result"></div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const listBtn = document.getElementById('listBtn');
        const resultDiv = document.getElementById('result');

        listBtn.addEventListener('click', listSessions);

        async function listSessions() {
            const apiKey = apiKeyInput.value.trim();

            if (!apiKey) {
                showResult('error', 'Please enter your Hyperbeam API key');
                return;
            }

            try {
                listBtn.disabled = true;
                listBtn.textContent = 'Loading...';

                // Fetch active sessions from Hyperbeam
                const response = await fetch('https://engine.hyperbeam.com/v0/vm', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status} ${response.statusText}`);
                }

                const sessions = await response.json();

                if (!sessions || sessions.length === 0) {
                    showResult('success', '✅ No active sessions! All clear.');
                    return;
                }

                displaySessions(sessions, apiKey);

            } catch (error) {
                console.error('Error:', error);
                showResult('error', `Failed to list sessions: ${error.message}`);
            } finally {
                listBtn.disabled = false;
                listBtn.textContent = 'List Active Sessions';
            }
        }

        function displaySessions(sessions, apiKey) {
            const html = `
                <div class="result success">
                    <strong>Found ${sessions.length} active session(s):</strong>
                    <div class="session-list">
                        ${sessions.map(session => `
                            <div class="session-item">
                                <span class="session-id">${session.session_id || 'Unknown ID'}</span>
                                <button class="kill-btn" onclick="terminateSession('${session.session_id}', '${apiKey}')">
                                    Terminate
                                </button>
                            </div>
                        `).join('')}
                    </div>
                    <div style="margin-top: 1rem;">
                        <button onclick="terminateAll(${JSON.stringify(sessions.map(s => s.session_id))}, '${apiKey}')" style="background: #dc2626; width: 100%; padding: 0.75rem;">
                            Terminate All Sessions
                        </button>
                    </div>
                </div>
            `;
            resultDiv.innerHTML = html;
        }

        async function terminateSession(sessionId, apiKey) {
            try {
                const response = await fetch(`https://engine.hyperbeam.com/v0/vm/${sessionId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });

                if (response.ok) {
                    showResult('success', `✅ Terminated session: ${sessionId}`);
                    // Refresh list
                    setTimeout(() => listSessions(), 1000);
                } else {
                    throw new Error(`Failed to terminate: ${response.status}`);
                }
            } catch (error) {
                showResult('error', `Failed to terminate ${sessionId}: ${error.message}`);
            }
        }

        async function terminateAll(sessionIds, apiKey) {
            if (!confirm(`Are you sure you want to terminate ${sessionIds.length} session(s)?`)) {
                return;
            }

            let succeeded = 0;
            let failed = 0;

            for (const sessionId of sessionIds) {
                try {
                    const response = await fetch(`https://engine.hyperbeam.com/v0/vm/${sessionId}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`
                        }
                    });

                    if (response.ok) {
                        succeeded++;
                    } else {
                        failed++;
                    }
                } catch (error) {
                    failed++;
                }
            }

            showResult('success', `✅ Terminated ${succeeded} session(s). ${failed} failed.`);

            // Refresh list
            setTimeout(() => listSessions(), 1000);
        }

        function showResult(type, message) {
            resultDiv.innerHTML = `<div class="result ${type}">${message}</div>`;
        }
    </script>
</body>
</html>
