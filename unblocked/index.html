    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --text-primary: #b0ffbe;
            --text-secondary: #cde1cb;

            --primary-color: #3ff148;

            --border-color: #505050;
            --danger-color: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;

        /* Top controls - search and login */

            top: 0;

            z-index: 100;
            display: flex;
            gap: 1rem;
            padding: 1rem;
            align-items: center;
        }

        .search-toggle {
            padding: 0.75rem 1.25rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-toggle:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary-color);
        }

        .login-btn {
            padding: 0.75rem 1.25rem;
            background: linear-gradient(135deg, var(--primary-color), #3bbe56);

        .user-avatar {

            border-radius: 50%;

            align-items: center;

            font-weight: 600;
            cursor: pointer;
            color: white;
        }

        /* Main layout */
        .main-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
            gap: 0;
        }

        /* Left sidebar - alphabetical list */
        .games-list-sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            height: 100vh;
            overflow-y: auto;
            position: sticky;
            top: 0;
        }

        .sidebar-header {
            padding: 1.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .sidebar-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .game-list {
            list-style: none;
            padding: 0.5rem 0;
        }

        .game-list-item {
            display: block;
            padding: 0.625rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }

        .game-list-item:hover {
            background: rgba(63, 241, 72, 0.1);
            color: var(--text-primary);
            border-left-color: var(--primary-color);
        }

        /* Main content area */
        .main-content {
            padding: 2rem;
            max-width: 1400px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Most played grid - 3:2 aspect ratio cards */
        .most-played-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .featured-game-card {
            aspect-ratio: 3 / 2;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            overflow: hidden;
            position: relative;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .featured-game-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-color);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
        }

        .featured-game-thumbnail {
            flex: 1;
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-tertiary));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .featured-game-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .featured-game-thumbnail-placeholder {
            font-size: 3rem;
            opacity: 0.3;
        }

        .featured-game-info {
            padding: 1rem;
            background: var(--bg-tertiary);
        }

        .featured-game-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .featured-game-plays {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Fullscreen search overlay */
        .search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 2rem;
        }

        .search-overlay.active {
            display: flex;
        }

        .search-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 1.25rem;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .close-search {
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .close-search:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .search-results {
            flex: 1;

        .search-result-item {
            display: flex;

        .search-result-thumbnail {

            flex: 1;
        }

        .search-result-title {

            font-weight: 600;

        .modal {

        .modal-title {

        }

        .form-group {

        .form-label {
            display: block;

            font-weight: 600;

        .form-input {

        .btn {

        .btn-primary {

        .btn-primary:hover {

        .loading-spinner {

        /* Mobile responsive */
        @media (max-width: 768px) {

    </style>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal">

            <form id="sign-in-form">

                </button>

                    <a href="#" id="reset-password-btn">Forgot password?</a>

                    Don't have an account? <a href="#" id="show-sign-up">Sign up</a>

            <!-- Sign Up Form -->
            <form id="sign-up-form" style="display: none;">

                    <label class="form-label">Display Name</label>

                    <input type="email" name="email" class="form-input" placeholder="your@email.com" required>

                    <label class="form-label">Password</label>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>

    <!-- Shared Modules -->
    <script src="shared/games-auth.js"></script>
    <script src="shared/game-manager.js"></script>

    <!-- Page Script -->
    <script>
        let allGames = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            // Setup auth modal
            setupAuthModal();

            // Setup search overlay
            setupSearchOverlay();

            // Load games
            await loadGames();

            // Listen for auth state changes
            window.gamesAuth.onAuthStateChanged((user) => {
                updateAuthUI(user);
            });
        });

        // Setup auth modal
        function setupAuthModal() {
            const modal = document.getElementById('auth-modal');
            const modalClose = document.getElementById('modal-close');
            const loginBtn = document.getElementById('login-btn');
            const signOutBtn = document.getElementById('signout-btn');

            loginBtn?.addEventListener('click', () => {
                modal.classList.add('active');
            });

            modalClose?.addEventListener('click', () => {
                modal.classList.remove('active');
            });

            modal?.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });

            // Form toggles
            document.getElementById('show-sign-up')?.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('sign-in-form').style.display = 'none';
                document.getElementById('sign-up-form').style.display = 'block';
                document.querySelector('.modal-title').textContent = 'Sign Up';
            });

            document.getElementById('show-sign-in')?.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('sign-in-form').style.display = 'block';
                document.getElementById('sign-up-form').style.display = 'none';
                document.querySelector('.modal-title').textContent = 'Sign In';
            });

            // Google sign in/up
            document.getElementById('google-sign-in')?.addEventListener('click', async () => {
                try {
                    await window.gamesAuth.signInWithGoogle();
                    modal.classList.remove('active');
                } catch (error) {
                    console.error('Google sign in error:', error);
                }
            });

            document.getElementById('google-sign-up')?.addEventListener('click', async () => {
                try {
                    await window.gamesAuth.signInWithGoogle();
                    modal.classList.remove('active');
                } catch (error) {
                    console.error('Google sign up error:', error);
                }
            });

            // Sign out
            signOutBtn?.addEventListener('click', async () => {
                await window.gamesAuth.signOut();
            });
        }

        // Update auth UI
        function updateAuthUI(user) {
            const loginBtn = document.getElementById('login-btn');
            const signOutBtn = document.getElementById('signout-btn');
            const userAvatar = document.getElementById('user-avatar');
            const avatarText = document.getElementById('user-avatar-text');

            if (user) {
                loginBtn.style.display = 'none';
                signOutBtn.style.display = 'block';
                userAvatar.style.display = 'flex';
                avatarText.textContent = (user.displayName || user.email || 'U').charAt(0).toUpperCase();
            } else {
                loginBtn.style.display = 'block';
                signOutBtn.style.display = 'none';
                userAvatar.style.display = 'none';
            }
        }

        // Setup search overlay
        function setupSearchOverlay() {
            const overlay = document.getElementById('search-overlay');
            const openBtn = document.getElementById('open-search');
            const closeBtn = document.getElementById('close-search');
            const searchInput = document.getElementById('search-input');

            openBtn.addEventListener('click', () => {
                overlay.classList.add('active');
                searchInput.focus();
            });

            closeBtn.addEventListener('click', () => {
                overlay.classList.remove('active');
                searchInput.value = '';
            });

            // Search functionality
            let searchTimeout;
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    performSearch(searchInput.value.trim());
                }, 300);
            });

            // Close on escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && overlay.classList.contains('active')) {
                    overlay.classList.remove('active');
                    searchInput.value = '';
                }
            });
        }

        // Load games
        async function loadGames() {
            try {
                const [mostPlayed, allPublished] = await Promise.all([
                    window.gameManager.getMostPlayedGames(12),
                    window.gameManager.getAllPublishedGames()
                ]);

                allGames = allPublished;

                // Render most played
                renderMostPlayed(mostPlayed);

                // Render alphabetical list
                renderAlphabeticalList(allPublished);
            } catch (error) {
                console.error('Error loading games:', error);
            }
        }

        // Render most played grid
        function renderMostPlayed(games) {
            const grid = document.getElementById('most-played-grid');

            if (!games || games.length === 0) {
                grid.innerHTML = '<p style="color: var(--text-muted);">No games available</p>';
                return;
            }

            grid.innerHTML = games.map(game => {
                const thumbnail = game.thumbnail || '';
                return `
                    <a href="/unblocked/game/?game=${game.id}" class="featured-game-card">
                        <div class="featured-game-thumbnail">
                            ${thumbnail ? `<img src="${thumbnail}" alt="${game.title}">` :
                                '<div class="featured-game-thumbnail-placeholder">🎮</div>'}
                        </div>
                        <div class="featured-game-info">
                            <div class="featured-game-title">${escapeHtml(game.title)}</div>
                            <div class="featured-game-plays">▶ ${(game.playCount || 0).toLocaleString()} plays</div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // Render alphabetical list
        function renderAlphabeticalList(games) {
            const list = document.getElementById('alphabetical-list');

            if (!games || games.length === 0) {
                list.innerHTML = '<p style="padding: 1rem; color: var(--text-muted);">No games</p>';
                return;
            }

            // Sort alphabetically
            const sorted = [...games].sort((a, b) => a.title.localeCompare(b.title));

            list.innerHTML = sorted.map(game => `
                <a href="/unblocked/game/?game=${game.id}" class="game-list-item">
                    ${escapeHtml(game.title)}
                </a>
            `).join('');
        }

        // Perform search
        function performSearch(query) {
            const resultsContainer = document.getElementById('search-results');

            if (!query) {
                resultsContainer.innerHTML = '<p style="color: var(--text-muted); text-align: center;">Start typing to search...</p>';
                return;
            }

            const results = allGames.filter(game =>
                game.title.toLowerCase().includes(query.toLowerCase()) ||
                (game.description && game.description.toLowerCase().includes(query.toLowerCase())) ||
                (game.tags && game.tags.some(tag => tag.toLowerCase().includes(query.toLowerCase())))
            );

            if (results.length === 0) {
                resultsContainer.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No games found</p>';
                return;
            }

            resultsContainer.innerHTML = results.map(game => {
                const thumbnail = game.thumbnail || '';
                return `
                    <a href="/unblocked/game/?game=${game.id}" class="search-result-item">
                        <div class="search-result-thumbnail">
                            ${thumbnail ? `<img src="${thumbnail}" alt="${game.title}">` : '🎮'}
                        </div>
                        <div class="search-result-info">
                            <div class="search-result-title">${escapeHtml(game.title)}</div>
                            <div class="search-result-description">${escapeHtml(game.description || 'No description')}</div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
