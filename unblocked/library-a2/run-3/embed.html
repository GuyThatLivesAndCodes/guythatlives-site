<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>      
        html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:"Gill Sans",sans-serif;background:transparent}
        .game-embed-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background-color:#274e13;border-radius:10px;overflow:hidden;position:relative;box-sizing:border-box;color:#fff;text-align:center}
        .button-wrapper{display:flex;flex-direction:column;align-items:center;gap:25px;padding:20px;width:100%;max-width:550px;box-sizing:border-box}
        .logo-text{font-family:"Gill Sans",sans-serif;font-size:2.5rem;font-weight:bold;color:#fff;text-shadow:2px 2px 5px rgba(0,0,0,.6);padding-bottom:10px}
        .button-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;width:100%}
        @media (max-width:480px){.button-grid{grid-template-columns:1fr}.logo-text{font-size:2rem}}
        .c-button{min-height:50px;appearance:none;border:2px solid rgba(0,0,0,.2);border-radius:8px;color:#fff;padding:10px 15px;font-size:18px;cursor:pointer;transition:all .2s ease-in-out;text-align:center;display:flex;align-items:center;justify-content:center;font-weight:bold}
        .btn-primary{background:#6aa84f}
        .btn-primary:hover{background:#8fbc8f;border-color:#a2d1a2;transform:translateY(-2px)}
        .btn-alt{background:#073763}
        .btn-alt:hover{background:#3d85c6;border-color:#6f9ac4;transform:translateY(-2px)}
        .c-button:focus{outline:none;box-shadow:0 0 0 4px #cbd6ee}
        .c-button:disabled{background:#555;cursor:not-allowed}
        .game-embed-container iframe{width:100%;height:100%;border:none}
    </style>
</head>
<body>
    <div id="gameContainer" class="game-embed-container">
        <div id="buttonWrapper" class="button-wrapper">
            <div class="logo-text">GUYTHATLIVES UNBLOCKED</div>
            <div class="button-grid">
                <button id="playPrimaryInline" class="c-button btn-primary">PLAY HERE</button>
                <button id="playPrimaryFullscreen" class="c-button btn-primary">FULLSCREEN</button>
                <button id="playAltInline" class="c-button btn-alt">PLAY HERE (Alt)</button>
                <button id="playAltFullscreen" class="c-button btn-alt">FULLSCREEN (Alt)</button>
                <button id="playPrimaryInline2" class="c-button btn-primary">PLAY HERE (New)</button>
                <button id="playPrimaryFullscreen2" class="c-button btn-primary">FULLSCREEN (New)</button>
            </div>
        </div>
    </div>
    <script>
        const gameContainer = document.getElementById("gameContainer"),
            googleScriptUrl = "https://lekug.github.io/tn6pS9dCf37xAhkJv/",

            playPrimaryInlineBtn = document.getElementById("playPrimaryInline"),
            playPrimaryFullscreenBtn = document.getElementById("playPrimaryFullscreen"),
            playAltInlineBtn = document.getElementById("playAltInline"),
            playAltFullscreenBtn = document.getElementById("playAltFullscreen"),
            playPrimaryInlineBtn2 = document.getElementById("playPrimaryInline2"),
            playPrimaryFullscreenBtn2 = document.getElementById("playPrimaryFullscreen2");

        playPrimaryInlineBtn.addEventListener("click", () => {
            gameContainer.innerHTML = "";
            const iframe = document.createElement("iframe");
            iframe.src = googleScriptUrl;
            gameContainer.appendChild(iframe);
        });

        playPrimaryFullscreenBtn.addEventListener("click", () => {
            const e = window.open("", "_blank");
            e && e.document.write(`<!DOCTYPE html><html><head><title>classroom.google.com</title><link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png"><style>body,html{margin:0;padding:0;height:100%;width:100%;overflow:hidden;}iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}</style></head><body><iframe src="${googleScriptUrl}" allowfullscreen></iframe></body></html>`);
        });

        playPrimaryInlineBtn2.addEventListener("click", () => {
            gameContainer.innerHTML = "";
            const iframe = document.createElement("iframe");
            iframe.src = newGoogleScriptUrl;
            gameContainer.appendChild(iframe);
        });

        playPrimaryFullscreenBtn2.addEventListener("click", () => {
            const e = window.open("", "_blank");
            e && e.document.write(`<!DOCTYPE html><html><head><title>classroom.google.com</title><link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png"><style>body,html{margin:0;padding:0;height:100%;width:100%;overflow:hidden;}iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}</style></head><body><iframe src="${newGoogleScriptUrl}" allowfullscreen></iframe></body></html>`);

                if (!response.ok) throw new Error(`Failed to load XML: ${response.status} ${response.statusText}`);

                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "application/xml");
                const contentElement = xmlDoc.querySelector("Content");
                if (!contentElement) throw new Error("<Content> not found in XML");
                const htmlContent = parser.parseFromString(contentElement.textContent, "text/html");
                readyHtmlContent = htmlContent.documentElement.outerHTML;
            } catch (err) {
                gameContainer.innerHTML = `<div style="color:red;padding:20px;">Error: ${err.message}</div>`;
                playAltInlineBtn.disabled = true;
                playAltFullscreenBtn.disabled = true;
            }
        }

        function launchAltGame(isInline) {
            if (!readyHtmlContent) return alert("Game is not ready yet. Please wait.");
            const blob = new Blob([readyHtmlContent], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            if (isInline) {
                gameContainer.innerHTML = "";
                const iframe = document.createElement("iframe");
                iframe.src = url;
                iframe.style.width = "100%";
                iframe.style.height = "100%";
                gameContainer.appendChild(iframe);
            } else {
                const popup = window.open(url, "_blank");
                if (!popup) alert("Please allow popups for this site.");
            }
        }

        prepareGameContent();
    </script>
</body>
</html>
