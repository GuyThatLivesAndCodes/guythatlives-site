<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oyun Başlatıcı</title>
  <style>
    .play-button {
      display: inline-block;
      padding: 20px 40px;
      background-color: #000000;
      color: #ffffff !important;
      border: 2px solid #4a148c;
      border-radius: 10px;
      font-family: Arial, sans-serif;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none !important;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1001; /* Butonun oyun üzerinde olmasını sağla */
    }
    
    .play-button:hover {
      background-color: #4a148c !important;
      transform: translate(-50%, -50%) scale(1.05);
    }
    
    .fullscreen-button {
      display: inline-block;
      padding: 10px 15px;
      background-color: #000000;
      color: #ffffff !important;
      border: 2px solid #4a148c;
      border-radius: 5px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none !important;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1002; /* Fullscreen butonu her zaman en üstte */
    }
    
    .fullscreen-button:hover {
      background-color: #4a148c !important;
      transform: scale(1.05);
    }
    
    .content-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      border: none;
      overflow: hidden;
      z-index: 1000; /* Oyun iframe'i fullscreen butonunun altında */
      background-color: #000;
    }
    
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
    }
  </style>
</head>
<body>
  <a id="playButton" class="play-button">CLICK TO PLAY</a>
  <a id="fullscreenButton" class="fullscreen-button">FULLSCREEN</a>
  <div id="contentContainer" class="content-container"></div>

  <script>
    // Oyun HTML'si
    const gameHTML = `
    
    
<html lang="en-us">
<head>
<meta charset="utf-8"/>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Zombie Road</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dem-google-usa/userconetn@main/TemplateData/style.css"/>
<script>
    const overlayBackgroundColor = "url('https://cdn.jsdelivr.net/gh/dem-google-usa/userconetn@main/background.gif')";
    const progressBarFillColor = "#FFFFFF";
    const progressBarBackgroundColor = "";
    const progressBarBorderColor = "";
<\/script>

</head>
<body class="light">
<div id="unity-container" class="unity-desktop">
<canvas id="unity-canvas"></canvas>
</div>
<div id="loading-cover" style="display:none;">
<div id="unity-loading-bar">
<div id="unity-logo"><img src="https://cdn.jsdelivr.net/gh/dem-google-usa/userconetn@main/logo.png"/></div>
<div id="unity-progress-bar-empty" style="display: none;">
<div id="unity-progress-bar-full"></div>
</div>
<div class="spinner"></div>
</div>
</div>
<script>
    const buildUrl = "https://cdn.jsdelivr.net/gh/dem-google-usa/userconetn@main/Build";
    const loaderUrl = buildUrl + "/9853637125e801e9aae48e78dbbdcfca.loader.js";
    const config = {
      dataUrl: buildUrl + "/ec6245a615fb70dd75120c0410fa20d4.data.unityweb",
      frameworkUrl: buildUrl + "/96bd8aea39332cc87ed68099a2f6a038.framework.js.unityweb",
      codeUrl: buildUrl + "/224f969d7232878c58a25d91697031f7.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "SquareDino",
      productName: "Road Chase Shooter",
      productVersion: "1.5.4",
    };

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const spinner = document.querySelector('.spinner');

    if (overlayBackgroundColor !== "-" && overlayBackgroundColor !== " " && overlayBackgroundColor !== "")
      canvas.style.background = overlayBackgroundColor;

    if (progressBarFillColor !== "-" && progressBarFillColor !== " " && progressBarFillColor !== "")
      progressBarFull.style.background = progressBarFillColor;

    if (progressBarBackgroundColor !== "-" && progressBarBackgroundColor !== " " && progressBarBackgroundColor !== "")
      progressBarEmpty.style.background = progressBarBackgroundColor;

    if (progressBarBorderColor !== "-" && progressBarBorderColor !== " " && progressBarBorderColor !== "")
      progressBarEmpty.style.border.color = progressBarBorderColor;


    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
    }

    loadingCover.style.display = "";

    const unityLoader = document.createElement("script");
    unityLoader.src = loaderUrl;
    unityLoader.onload = async () => {
      //await _gpAwaiter.ready;
      createUnityInstance(canvas, config, (progress) => {
        spinner.style.display = "none";
        progressBarEmpty.style.display = "";
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        window.unityInstance = unityInstance;
        //_unityAwaiter.done(unityInstance);
        loadingCover.style.display = "none";
      }).catch((message) => {
        //_unityAwaiter.abort(message);
        alert(message);
      });
    };
    document.body.appendChild(unityLoader);

    document.addEventListener("pointerdown", () => {
      container.focus();
      window.focus();
      canvas.focus();
    });

  <\/script>
</body>
</html>



    `.trim();

    // Butona olay dinleyicisi ekle
    document.addEventListener('DOMContentLoaded', function() {
      const playButton = document.getElementById('playButton');
      const fullscreenButton = document.getElementById('fullscreenButton');
      
      if (playButton) {
        playButton.addEventListener('click', showContent);
      } else {
        console.error('Play butonu bulunamadı.');
      }
      
      if (fullscreenButton) {
        fullscreenButton.addEventListener('click', openFullscreen);
      } else {
        console.error('Fullscreen butonu bulunamadı.');
      }
    });

function showContent() {
  try {
    // Play butonunu gizle
    document.getElementById('playButton').style.display = 'none';
    
    // Container'ı göster
    const container = document.getElementById('contentContainer');
    container.style.display = 'block';
    
    // Direkt HTML içeriğini container'a yaz
    container.innerHTML = gameHTML;
    
    // Script'leri yeniden çalıştır
    const scripts = container.getElementsByTagName('script');
    for (let script of scripts) {
      const newScript = document.createElement('script');
      newScript.textContent = script.textContent;
      document.body.appendChild(newScript);
    }
  } catch (error) {
    console.error('Hata oluştu:', error);
    alert('Oyun yüklenemedi. Tarayıcı konsolunu kontrol edin.');
  }
}

    function openFullscreen() {
      try {
        // Yeni sekme aç
        const newWin = window.open("about:blank", "_blank");
        if (newWin) {
          newWin.document.open();
          newWin.document.write(gameHTML);
          newWin.document.close();

          // Tam ekran modunu ayarla (isteğe bağlı, tarayıcıya bağlı olarak çalışmayabilir)
          setTimeout(() => {
            if (newWin.document.documentElement.requestFullscreen) {
              newWin.document.documentElement.requestFullscreen();
            } else if (newWin.document.documentElement.mozRequestFullScreen) {
              newWin.document.documentElement.mozRequestFullScreen();
            } else if (newWin.document.documentElement.webkitRequestFullscreen) {
              newWin.document.documentElement.webkitRequestFullscreen();
            } else if (newWin.document.documentElement.msRequestFullscreen) {
              newWin.document.documentElement.msRequestFullscreen();
            }
          }, 500);
        } else {
          alert("Yeni sekme açma engellendi. Lütfen tarayıcı ayarlarını kontrol edin.");
        }
      } catch (error) {
        console.error('Fullscreen hata:', error);
        alert('Tam ekran modu çalışmadı. Tarayıcı konsolunu kontrol edin.');
      }
    }
  </script>
</body>
</html>
