<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G+</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0e17;
      --bg-card: #1a1930;
      --bg-card-hover: #252347;
      --accent-1: #ff6b6b;
      --accent-2: #ffd93d;
      --accent-3: #6bcb77;
      --accent-4: #4d96ff;
      --accent-5: #c77dff;
      --text-primary: #fffffe;
      --text-muted: #a7a9be;
      --glow-1: rgba(255, 107, 107, 0.3);
      --glow-2: rgba(77, 150, 255, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      font-family: 'Quicksand', sans-serif;
      color: var(--text-primary);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* === ANIMATED BG BLOBS === */
    .bg-blobs {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none; overflow: hidden;
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12;
      animation: blobFloat 18s ease-in-out infinite alternate;
    }
    .blob-1 { width: 400px; height: 400px; background: var(--accent-1); top: -10%; left: -5%; animation-delay: 0s; }
    .blob-2 { width: 350px; height: 350px; background: var(--accent-4); top: 50%; right: -8%; animation-delay: -6s; }
    .blob-3 { width: 300px; height: 300px; background: var(--accent-5); bottom: -5%; left: 30%; animation-delay: -12s; }

    @keyframes blobFloat {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
      100% { transform: translate(10px, -10px) scale(1.05); }
    }

    /* === HEADER / NAV === */
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15, 14, 23, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700; font-size: 22px;
      display: flex; align-items: center; gap: 8px;
      user-select: none;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 12px var(--glow-1);
    }
    .logo span:nth-child(2) { color: var(--accent-2); }
    .logo span:nth-child(3) { color: var(--text-primary); }

    .search-box {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 6px 14px;
      max-width: 260px; width: 100%;
      transition: border-color 0.3s, background 0.3s;
    }
    .search-box:focus-within {
      border-color: var(--accent-4);
      background: rgba(77, 150, 255, 0.08);
    }
    .search-box input {
      background: none; border: none; outline: none;
      color: var(--text-primary);
      font-family: 'Quicksand', sans-serif;
      font-size: 13px; width: 100%;
      margin-left: 6px;
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-icon { font-size: 14px; color: var(--text-muted); }

    .nav-pills {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .pill {
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-muted);
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
      font-family: 'Quicksand', sans-serif;
    }
    .pill:hover, .pill.active {
      background: linear-gradient(135deg, var(--accent-4), var(--accent-5));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 12px var(--glow-2);
    }

    /* === MAIN LAYOUT === */
    .main-wrap {
      position: relative; z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
    }

    /* === PLAYER === */
    .player-section { display: flex; flex-direction: column; gap: 12px; }

    .player-frame {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .player-frame iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: 0;
    }
    .player-loading {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fredoka', sans-serif; font-size: 18px;
      color: var(--text-muted);
      background: linear-gradient(135deg, #1a1930, #0f0e17);
    }
    .player-loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent-4);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .now-playing-info {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .now-playing-title {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600; font-size: 16px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .now-playing-channel {
      font-size: 13px; color: var(--accent-4);
      font-weight: 600;
    }

    /* === SIDEBAR (UP NEXT) === */
    .sidebar {
      display: flex; flex-direction: column; gap: 0;
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
      max-height: calc(100vh - 100px);
    }
    .sidebar-header {
      padding: 14px 16px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700; font-size: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; gap: 8px;
      color: var(--accent-2);
      position: sticky; top: 0;
      background: var(--bg-card);
      z-index: 2;
    }
    .sidebar-list {
      overflow-y: auto;
      flex: 1;
      padding: 6px;
    }
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-track { background: transparent; }
    .sidebar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .side-card {
      display: flex; gap: 10px;
      padding: 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      align-items: flex-start;
    }
    .side-card:hover { background: var(--bg-card-hover); }
    .side-card.active-video { background: rgba(77, 150, 255, 0.1); border: 1px solid rgba(77, 150, 255, 0.2); }

    .side-thumb {
      width: 120px; min-width: 120px;
      aspect-ratio: 16/9;
      border-radius: 8px;
      object-fit: cover;
      background: #111;
    }
    .side-meta { display: flex; flex-direction: column; gap: 3px; overflow: hidden; padding-top: 2px; }
    .side-title {
      font-size: 12.5px; font-weight: 700;
      color: var(--text-primary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.3;
    }
    .side-channel {
      font-size: 11px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* === BOTTOM GALLERY (EXPLORE) === */
    .explore-section {
      position: relative; z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 8px 16px 40px;
    }
    .explore-header {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700; font-size: 20px;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }

    .explore-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .vid-card {
      border-radius: 14px;
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s;
    }
    .vid-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
      border-color: rgba(255,255,255,0.1);
    }
    .vid-card-thumb-wrap {
      position: relative;
      overflow: hidden;
    }
    .vid-card-thumb {
      width: 100%; aspect-ratio: 16/9;
      object-fit: cover; display: block;
      transition: transform 0.3s;
    }
    .vid-card:hover .vid-card-thumb { transform: scale(1.05); }
    .vid-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(transparent 50%, rgba(0,0,0,0.6));
      opacity: 0;
      transition: opacity 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .vid-card:hover .vid-card-overlay { opacity: 1; }
    .play-btn-circle {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.95);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      transform: scale(0.8);
      transition: transform 0.25s;
    }
    .vid-card:hover .play-btn-circle { transform: scale(1); }
    .play-tri {
      width: 0; height: 0;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      border-left: 15px solid var(--accent-1);
      margin-left: 3px;
    }

    .vid-card-info { padding: 10px 12px 12px; }
    .vid-card-title {
      font-size: 13.5px; font-weight: 700;
      color: var(--text-primary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.35;
      margin-bottom: 5px;
    }
    .vid-card-channel {
      font-size: 12px;
      color: var(--accent-3);
      font-weight: 600;
    }

    /* === STATUS / ERROR === */
    .status-msg {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 40px 20px;
      font-family: 'Fredoka', sans-serif;
      font-size: 16px; color: var(--text-muted);
    }
    .status-msg.error { color: var(--accent-1); }

    /* === FOOTER === */
    .footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      font-family: 'Quicksand', sans-serif;
    }

    /* === RESPONSIVE === */
    @media (max-width: 860px) {
      .main-wrap {
        grid-template-columns: 1fr;
      }
      .sidebar {
        max-height: 360px;
      }
      .search-box { max-width: 180px; }
      .nav-pills { display: none; }
    }
    @media (max-width: 500px) {
      .top-bar { padding: 8px 12px; }
      .logo { font-size: 18px; }
      .logo-icon { width: 30px; height: 30px; font-size: 15px; }
      .search-box { max-width: 140px; padding: 5px 10px; }
      .main-wrap { padding: 10px; }
      .explore-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
      }
      .side-thumb { width: 100px; min-width: 100px; }
    }

    /* === FADE-IN ANIM === */
    .fade-up {
      opacity: 0; transform: translateY(16px);
      animation: fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Top Navigation -->
  <div class="top-bar">
    <div class="logo">
      <div class="logo-icon">▶</div>
      <span>Play</span><span>G+</span>
    </div>
    <div class="nav-pills" id="categoryPills">
      <div class="pill active" data-cat="all">All</div>
      <div class="pill" data-cat="roblox">Roblox</div>
      <div class="pill" data-cat="minecraft">Minecraft</div>
      <div class="pill" data-cat="fortnite">Fortnite</div>
      <div class="pill" data-cat="challenge">Challenge</div>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search videos..." />
    </div>
  </div>

  <!-- Main Content: Player + Sidebar -->
  <div class="main-wrap">
    <div class="player-section">
      <div class="player-frame" id="playerFrame">
        <div class="player-loading">
          <div class="spinner"></div>
          Loading...
        </div>
      </div>
      <div class="now-playing-info" id="nowPlaying" style="display:none;">
        <div class="now-playing-title" id="npTitle"></div>
        <div class="now-playing-channel" id="npChannel"></div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">
        ⚡ Up Next
      </div>
      <div class="sidebar-list" id="sidebarList"></div>
    </div>
  </div>

  <!-- Explore Grid -->
  <div class="explore-section">
    <div class="explore-header">🎮 Explore More</div>
    <div class="explore-grid" id="exploreGrid"></div>
  </div>

  <div class="footer">
    PlayZone TV © 2025 — Videos for fun & entertainment only.
  </div>

  <script>
    // ========== CONFIG ==========
    const FEED_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQI-2V5YW4mgXqO2ZXRbQfmpkrSgpLug3J9RJVWpi_6ODID8246bvMckEDy1R_hc8XVPHglrKPGrrVD/pub?output=csv";
    const TOKEN = "AXH1ezkOPltwrApEtyVwFrRejypqSmTgbjJWFGITWwJlvm6DQxvxcg8aY1lsQaV_QSiR1CxUtdZQWDKBdmrHvX4QNPa6P4yZARiEX2DfW9EziYXwvCfxK0z8LL3bYznq_2TdQmfIqkbUJpnwhi1FT9QwvcdnuYLmfQ==";

    let videos = [];
    let currentVideoId = null;

    // ========== CSV PARSER (handles quoted fields) ==========
    function parseCSVRow(row) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < row.length; i++) {
        const ch = row[i];
        if (ch === '"') {
          if (inQuotes && row[i + 1] === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += ch;
        }
      }
      result.push(current.trim().replace(/\r$/, ''));
      return result;
    }

    // ========== INIT ==========
    async function boot() {
      try {
        // Fetch feed
        const feedRes = await fetch(FEED_URL);
        const feedText = await feedRes.text();
        const feedLines = feedText.split('\n');

        for (let i = 1; i < feedLines.length; i++) {
          const row = feedLines[i].trim();
          if (!row) continue;
          const cols = parseCSVRow(row);
          if (cols.length >= 4 && cols[1] && cols[1].length > 5) {
            videos.push({
              title: cols[0],
              videoId: cols[1],
              thumb: cols[2],
              channel: cols[3]
            });
          }
        }

        if (videos.length > 0) {
          renderSidebar(videos);
          renderExplore(videos);
          playVideo(videos[0]);
          setupSearch();
          setupCategories();
        } else {
          showError("Couldn't load videos. Please try again later.");
        }
      } catch (e) {
        console.error(e);
        showError("Connection error. Please refresh the page.");
      }
    }

    // ========== PLAYER ==========
    function playVideo(video) {
      currentVideoId = video.videoId;
      const frame = document.getElementById('playerFrame');
      const src = `https://www.youtubeeducation.com/embed/${video.videoId}?autoplay=1&mute=0&controls=1&start=0&origin=https%3A%2F%2Fcreate.kahoot.it&playsinline=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&fs=1&cc_load_policy=0&embed_config=%7B%22enc%22%3A%22${TOKEN}%22%2C%22hideTitle%22%3Atrue%7D`;
      frame.innerHTML = `<iframe src="${src}" allow="autoplay; encrypted-media" allowfullscreen loading="lazy"></iframe>`;

      // Update now-playing info
      const np = document.getElementById('nowPlaying');
      np.style.display = 'block';
      document.getElementById('npTitle').textContent = video.title;
      document.getElementById('npChannel').textContent = video.channel;

      // Highlight active in sidebar
      document.querySelectorAll('.side-card').forEach(c => c.classList.remove('active-video'));
      const active = document.querySelector(`.side-card[data-vid="${video.videoId}"]`);
      if (active) {
        active.classList.add('active-video');
        active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ========== SIDEBAR ==========
    function renderSidebar(list) {
      const container = document.getElementById('sidebarList');
      container.innerHTML = '';
      list.forEach((v, i) => {
        const card = document.createElement('div');
        card.className = 'side-card' + (i === 0 ? ' active-video' : '');
        card.dataset.vid = v.videoId;
        card.onclick = () => playVideo(v);
        card.innerHTML = `
          <img src="${v.thumb}" class="side-thumb" alt="" loading="lazy" />
          <div class="side-meta">
            <div class="side-title">${escHtml(v.title)}</div>
            <div class="side-channel">${escHtml(v.channel)}</div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // ========== EXPLORE GRID ==========
    function renderExplore(list) {
      const grid = document.getElementById('exploreGrid');
      grid.innerHTML = '';
      list.forEach((v, i) => {
        const card = document.createElement('div');
        card.className = 'vid-card fade-up';
        card.style.animationDelay = `${Math.min(i * 0.04, 0.8)}s`;
        card.onclick = () => playVideo(v);
        card.innerHTML = `
          <div class="vid-card-thumb-wrap">
            <img src="${v.thumb}" class="vid-card-thumb" alt="" loading="lazy" />
            <div class="vid-card-overlay">
              <div class="play-btn-circle"><div class="play-tri"></div></div>
            </div>
          </div>
          <div class="vid-card-info">
            <div class="vid-card-title">${escHtml(v.title)}</div>
            <div class="vid-card-channel">${escHtml(v.channel)}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // ========== SEARCH ==========
    function setupSearch() {
      const input = document.getElementById('searchInput');
      let debounce;
      input.addEventListener('input', () => {
        clearTimeout(debounce);
        debounce = setTimeout(() => {
          const q = input.value.toLowerCase().trim();
          const filtered = q ? videos.filter(v =>
            v.title.toLowerCase().includes(q) || v.channel.toLowerCase().includes(q)
          ) : videos;
          renderExplore(filtered);
          renderSidebar(filtered);
          // Reset category pills
          document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
          if (!q) document.querySelector('.pill[data-cat="all"]').classList.add('active');
        }, 250);
      });
    }

    // ========== CATEGORY FILTER ==========
    function setupCategories() {
      document.querySelectorAll('.pill').forEach(pill => {
        pill.addEventListener('click', () => {
          document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
          const cat = pill.dataset.cat;
          document.getElementById('searchInput').value = '';

          let filtered;
          if (cat === 'all') {
            filtered = videos;
          } else {
            filtered = videos.filter(v => {
              const text = (v.title + ' ' + v.channel).toLowerCase();
              return text.includes(cat);
            });
          }
          renderExplore(filtered);
          renderSidebar(filtered);
        });
      });
    }

    // ========== HELPERS ==========
    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function showError(msg) {
      document.getElementById('playerFrame').innerHTML = `<div class="player-loading" style="flex-direction:column;gap:8px;"><span style="font-size:32px;">😔</span><span>${msg}</span></div>`;
    }

    // ========== GO ==========
    boot();
  </script>
</body>
</html>
