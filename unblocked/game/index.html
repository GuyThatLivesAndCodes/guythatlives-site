<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Game... - GuyThatLives</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6552523352090461"
     crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --text-primary: #b0ffbe;
            --text-secondary: #cde1cb;
            --text-muted: #95b894;
            --primary-color: #3ff148;
            --primary-light: #71d487;
            --border-color: #505050;
            --danger-color: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            overflow-y: auto;
            overflow-x: hidden;
            background: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
        }

        /* Top controls */
        .top-controls {
            position: fixed;
            top: 0;
            right: 0;
            z-index: 100;
            display: flex;
            gap: 1rem;
            padding: 1rem;
            align-items: center;
            transition: opacity 0.3s;
        }

        .top-controls.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .search-toggle {
            padding: 0.75rem 1.25rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-toggle:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary-color);
        }

        .game-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem;
            padding-top: 5rem;
        }

        .back-button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .back-button:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .game-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .game-title-text {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .game-meta {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .game-controls {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .control-btn {
            background: var(--bg-tertiary);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .control-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .game-frame-wrapper {
            position: relative;
            background: #000;
            border-radius: 0.5rem;
            overflow: hidden;
            width: 100%;
            margin: 0 auto 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 2px solid var(--border-color);
            cursor: pointer;
        }

        .game-frame-wrapper.fullscreen-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            max-width: none;
            border-radius: 0;
            z-index: 9999;
            border: none;
        }

        .game-frame {
            width: 100%;
            height: 700px;
            border: none;
            display: block;
        }

        @media (min-width: 1200px) {
            .game-frame {
                height: 800px;
            }
        }

        .game-frame-wrapper.fullscreen-mode .game-frame {
            height: 100vh;
        }

        .fullscreen-exit-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 1rem;
            display: none;
            z-index: 10000;
            align-items: center;
            justify-content: space-between;
        }

        .fullscreen-exit-overlay.visible {
            display: flex;
        }

        .fullscreen-exit-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-exit-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .fullscreen-hint {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.875rem;
        }

        .game-loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            z-index: 5;
        }

        .game-loading.hidden {
            display: none;
        }

        .loading-spinner {
            width: 64px;
            height: 64px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .game-error {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 2rem;
            text-align: center;
            z-index: 5;
        }

        .game-error.visible {
            display: flex;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .error-message {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .btn {
            padding: 0.875rem 1.75rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #3bbe56);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(63, 241, 72, 0.3);
        }

        /* Search overlay */
        .search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 2rem;
        }

        .search-overlay.active {
            display: flex;
        }

        .search-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 1.25rem;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .close-search {
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .close-search:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .search-results {
            flex: 1;
            overflow-y: auto;
        }

        .search-result-item {
            display: flex;
            gap: 1.5rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }

        .search-result-item:hover {
            border-color: var(--primary-color);
            transform: translateX(4px);
        }

        .search-result-thumbnail {
            width: 120px;
            height: 80px;
            background: var(--bg-tertiary);
            border-radius: 0.375rem;
            flex-shrink: 0;
            overflow: hidden;
        }

        .search-result-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .search-result-info {
            flex: 1;
        }

        .search-result-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .search-result-description {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .panic-btn {
            border: 2px solid var(--danger-color);
        }

        .panic-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger-color);
            color: var(--danger-color);
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 1rem;
                padding-top: 4rem;
            }

            .game-title-text {
                font-size: 1.75rem;
            }

            .game-frame {
                height: 400px;
            }

            .control-btn span:not(:first-child) {
                display: none;
            }

            .top-controls {
                padding: 0.75rem;
            }

            .search-toggle {
                padding: 0.625rem 1rem;
                font-size: 0.85rem;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }
    </style>
</head>
<body>
    <!-- Top controls - search (hidden in fullscreen) -->
    <div class="top-controls" id="top-controls">
        <button class="search-toggle" id="open-search">
            🔍 Search Games
        </button>
    </div>

    <div class="game-container">
        <!-- Back Button -->
        <button class="back-button" onclick="window.location.href='/unblocked/'">
            ← Back to Games
        </button>

        <!-- Game Header -->
        <div class="game-header">
            <h1 class="game-title-text" id="game-title">Loading...</h1>
            <div class="game-meta" id="game-meta" style="display: none;">
                <span id="game-category">Loading...</span>
                <span>•</span>
                <span id="game-plays">0 plays</span>
                <span>•</span>
                <span id="live-players" style="display: flex; align-items: center; gap: 0.5rem;">
                    <span style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite;"></span>
                    <span id="live-player-count">0</span> playing now
                </span>
            </div>
        </div>

        <!-- Game Controls -->
        <div class="game-controls">
            <button class="control-btn" id="shuffle-btn" title="Play a random game">
                <span>🎲</span>
                <span>Shuffle</span>
            </button>
            <button class="control-btn disguise-toggle-btn" title="Disguise page as Google Docs">
                <span>🕶️</span>
                <span>Disguise</span>
            </button>
            <button class="control-btn panic-btn" title="Quick hide - Press any key to return">
                <span>🚨</span>
                <span>Panic</span>
            </button>
            <button class="control-btn" id="fullscreen-btn">
                <span>⛶</span>
                <span>Fullscreen</span>
            </button>
            <button class="control-btn" id="source-game-btn" title="Open game directly from source">
                <span>🔗</span>
                <span>Source</span>
            </button>
        </div>

        <!-- Game Frame -->
        <div class="game-frame-wrapper" id="game-wrapper">
            <iframe id="game-frame" class="game-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock" allowfullscreen></iframe>

            <!-- Loading State -->
            <div class="game-loading" id="game-loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">Loading game...</div>
            </div>

            <!-- Error State -->
            <div class="game-error" id="game-error">
                <div class="error-icon">😞</div>
                <div class="error-title">Game Not Found</div>
                <div class="error-message">We couldn't load this game. It may have been removed or doesn't exist.</div>
                <a href="/unblocked/" class="btn btn-primary">Back to Games</a>
            </div>

            <!-- Fullscreen Exit Overlay -->
            <div class="fullscreen-exit-overlay" id="fullscreen-overlay">
                <div class="fullscreen-hint">Press ESC or click Exit to leave fullscreen</div>
                <button class="fullscreen-exit-btn" id="fullscreen-exit-btn">Exit Fullscreen</button>
            </div>
        </div>
    </div>

    <!-- Search overlay -->
    <div class="search-overlay" id="search-overlay">
        <div class="search-header">
            <input type="text" class="search-input" id="search-input" placeholder="Search for games..." autofocus>
            <button class="close-search" id="close-search">✕ Close</button>
        </div>
        <div class="search-results" id="search-results">
            <p style="color: var(--text-muted); text-align: center;">Start typing to search...</p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>

    <!-- Shared Modules -->
    <script src="../shared/games-auth.js"></script>
    <script src="../shared/game-manager.js"></script>
    <script src="../shared/disguise.js"></script>
    <script src="../shared/game-saves.js"></script>
    <script src="../shared/bug-reporter.js"></script>
    <script src="../shared/presence-tracker.js"></script>
    <script src="../shared/stats-widget.js"></script>

    <!-- Game Player Script -->
    <script>
        let allGames = [];
        let currentGame = null;

        function injectBaseTag(html, baseUrl) {
            html = html.replace(/<base[^>]*>/gi, '');
            if (!baseUrl.endsWith('/')) {
                baseUrl += '/';
            }
            const baseTag = `<base href="${baseUrl}">`;
            if (html.match(/<head[^>]*>/i)) {
                html = html.replace(/<head[^>]*>/i, match => `${match}${baseTag}`);
            } else if (html.match(/<html[^>]*>/i)) {
                html = html.replace(/<html[^>]*>/i, match => `${match}<head>${baseTag}</head>`);
            } else {
                html = baseTag + html;
            }
            return html;
        }

        function getGameId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('game');
        }

        async function updateLivePlayerCount(gameId) {
            try {
                const count = await window.presenceTracker.getGamePlayerCount(gameId);
                const countElement = document.getElementById('live-player-count');
                if (countElement) {
                    countElement.textContent = count;
                }
            } catch (error) {
                console.error('Error updating live player count:', error);
            }
        }

        async function loadGame() {
            const gameId = getGameId();

            if (!gameId) {
                showError('No game specified');
                return;
            }

            try {
                currentGame = await window.gameManager.getGame(gameId);
                document.title = `${currentGame.title} - Unblocked Games`;
                document.getElementById('game-title').textContent = currentGame.title;

                const gameMeta = document.getElementById('game-meta');
                if (currentGame.category) {
                    document.getElementById('game-category').textContent = currentGame.category;
                    document.getElementById('game-plays').textContent = `${currentGame.playCount || 0} plays`;
                    gameMeta.style.display = 'flex';
                }

                await window.presenceTracker.initialize();
                await window.presenceTracker.trackGamePlay(gameId);
                await updateLivePlayerCount(gameId);
                setInterval(() => updateLivePlayerCount(gameId), 15000);

                const gameFrame = document.getElementById('game-frame');

                if (!currentGame.gameUrl) {
                    showError('Game URL not configured');
                    return;
                }

                // Simple direct loading with sandbox attributes
                console.log('Loading game from:', currentGame.gameUrl);
                gameFrame.src = currentGame.gameUrl;

                gameFrame.onerror = (error) => {
                    console.error('Game frame error:', error);
                    showError('Failed to load game content');
                };

                gameFrame.onload = () => {
                    console.log('Game loaded successfully');
                    document.getElementById('game-loading').classList.add('hidden');

                    // Auto-focus the game iframe after a short delay
                    setTimeout(() => {
                        try {
                            gameFrame.focus();
                            console.log('Game iframe focused');
                        } catch (error) {
                            console.log('Could not auto-focus iframe:', error);
                        }
                    }, 500);
                };

                await window.gameManager.incrementPlayCount(gameId);

                const user = window.gamesAuth.getCurrentUser();
                if (user) {
                    await window.gameManager.trackUserPlay(gameId, user.uid);
                }

            } catch (error) {
                console.error('Error loading game:', error);
                showError(error.message);
            }
        }

        function showError(message) {
            document.getElementById('game-loading').classList.add('hidden');
            const errorEl = document.getElementById('game-error');
            errorEl.classList.add('visible');
            errorEl.querySelector('.error-message').textContent = message;
        }

        function toggleFullscreen() {
            const wrapper = document.getElementById('game-wrapper');
            const btn = document.getElementById('fullscreen-btn');
            const overlay = document.getElementById('fullscreen-overlay');
            const topControls = document.getElementById('top-controls');
            const gameFrame = document.getElementById('game-frame');

            if (wrapper.classList.contains('fullscreen-mode')) {
                wrapper.classList.remove('fullscreen-mode');
                btn.innerHTML = '<span>⛶</span><span>Fullscreen</span>';
                document.body.style.overflow = 'auto';
                overlay.classList.remove('visible');
                topControls.classList.remove('hidden');
            } else {
                wrapper.classList.add('fullscreen-mode');
                btn.innerHTML = '<span>⛶</span><span>Exit Fullscreen</span>';
                document.body.style.overflow = 'hidden';
                overlay.classList.add('visible');
                topControls.classList.add('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });

                // Focus the game when entering fullscreen
                setTimeout(() => {
                    try {
                        gameFrame.focus();
                        console.log('Game iframe focused on fullscreen');
                    } catch (error) {
                        console.log('Could not focus iframe on fullscreen:', error);
                    }
                }, 300);
            }
        }

        async function goToRandomGame() {
            try {
                const games = await window.gameManager.getAllGames();
                if (games && games.length > 0) {
                    const randomIndex = Math.floor(Math.random() * games.length);
                    const randomGame = games[randomIndex];
                    window.location.href = `/unblocked/game/?game=${randomGame.id}`;
                }
            } catch (error) {
                console.error('Error loading random game:', error);
                alert('Could not load a random game. Please try again.');
            }
        }

        function openSourceGame() {
            if (currentGame && currentGame.gameUrl) {
                window.open(currentGame.gameUrl, '_blank');
            } else {
                alert('Source game URL not available');
            }
        }

        // Setup search overlay
        function setupSearchOverlay() {
            const overlay = document.getElementById('search-overlay');
            const openBtn = document.getElementById('open-search');
            const closeBtn = document.getElementById('close-search');
            const searchInput = document.getElementById('search-input');

            openBtn.addEventListener('click', () => {
                overlay.classList.add('active');
                searchInput.focus();
                loadAllGames();
            });

            closeBtn.addEventListener('click', () => {
                overlay.classList.remove('active');
                searchInput.value = '';
            });

            let searchTimeout;
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    performSearch(searchInput.value.trim());
                }, 300);
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && overlay.classList.contains('active')) {
                    overlay.classList.remove('active');
                    searchInput.value = '';
                }
            });
        }

        async function loadAllGames() {
            if (allGames.length > 0) return;
            try {
                allGames = await window.gameManager.getAllPublishedGames();
            } catch (error) {
                console.error('Error loading games:', error);
            }
        }

        function performSearch(query) {
            const resultsContainer = document.getElementById('search-results');

            if (!query) {
                resultsContainer.innerHTML = '<p style="color: var(--text-muted); text-align: center;">Start typing to search...</p>';
                return;
            }

            const results = allGames.filter(game =>
                game.title.toLowerCase().includes(query.toLowerCase()) ||
                (game.description && game.description.toLowerCase().includes(query.toLowerCase())) ||
                (game.tags && game.tags.some(tag => tag.toLowerCase().includes(query.toLowerCase())))
            );

            if (results.length === 0) {
                resultsContainer.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No games found</p>';
                return;
            }

            resultsContainer.innerHTML = results.map(game => {
                const thumbnail = game.thumbnail || '';
                return `
                    <a href="/unblocked/game/?game=${game.id}" class="search-result-item">
                        <div class="search-result-thumbnail">
                            ${thumbnail ? `<img src="${thumbnail}" alt="${game.title}">` : '🎮'}
                        </div>
                        <div class="search-result-info">
                            <div class="search-result-title">${escapeHtml(game.title)}</div>
                            <div class="search-result-description">${escapeHtml(game.description || 'No description')}</div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadGame();
            setupSearchOverlay();

            document.getElementById('fullscreen-btn').addEventListener('click', toggleFullscreen);
            document.getElementById('fullscreen-exit-btn').addEventListener('click', toggleFullscreen);
            document.getElementById('shuffle-btn').addEventListener('click', goToRandomGame);
            document.getElementById('source-game-btn').addEventListener('click', openSourceGame);

            // Focus game when clicking on the game wrapper
            const gameWrapper = document.getElementById('game-wrapper');
            const gameFrame = document.getElementById('game-frame');

            gameWrapper.addEventListener('click', (e) => {
                // Only focus if not clicking on control buttons or overlays
                if (e.target === gameWrapper || e.target === gameFrame) {
                    try {
                        gameFrame.focus();
                        console.log('Game iframe focused on click');
                    } catch (error) {
                        console.log('Could not focus iframe on click:', error);
                    }
                }
            });

            // Also focus on mouse enter for convenience
            gameWrapper.addEventListener('mouseenter', () => {
                try {
                    gameFrame.focus();
                } catch (error) {
                    // Silent fail
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'f' || e.key === 'F') {
                    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                        e.preventDefault();
                        toggleFullscreen();
                    }
                }

                if (e.key === 'Escape') {
                    const wrapper = document.getElementById('game-wrapper');
                    if (wrapper.classList.contains('fullscreen-mode')) {
                        toggleFullscreen();
                    }
                }
            });
        });
    </script>
</body>
</html>
