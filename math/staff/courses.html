<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courses — Staff Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="staff.css">
</head>
<body>
<div class="bg-container"></div>
<div class="grid-overlay"></div>

<div class="staff-app">
  <header class="staff-header">
    <a href="/math/staff/" class="logo">// staff</a>
    <nav class="breadcrumb">
      <a href="/math/staff/">Dashboard</a>
      <span>/</span>
      <span>Courses</span>
    </nav>
    <div class="header-actions">
      <span id="roleDisplay" style="color:var(--text-muted);font-size:0.75rem;"></span>
      <a href="/math/" class="btn btn-ghost btn-sm">← Math Home</a>
    </div>
  </header>

  <div class="staff-body">
    <nav class="staff-sidebar">
      <div class="nav-section">Content</div>
      <a href="/math/staff/"><span class="nav-icon">⌂</span> Dashboard</a>
      <a href="/math/staff/courses.html" class="active"><span class="nav-icon">📚</span> Courses</a>
      <div class="nav-section" style="margin-top:1rem">Admin</div>
      <a href="/math/staff/roles.html" data-require-owner><span class="nav-icon">👥</span> Roles</a>
    </nav>

    <main class="staff-content">
      <div class="section-header">
        <div>
          <div class="page-title">Courses</div>
          <div class="page-subtitle">All courses across all subjects.</div>
        </div>
        <button class="btn btn-primary" id="btnNewCourse" data-require-edit>+ New Course</button>
      </div>

      <!-- Filters -->
      <div style="display:flex;gap:0.75rem;margin-bottom:1.25rem;align-items:center">
        <input type="text" class="form-input" id="searchInput" placeholder="Search courses..." style="max-width:260px">
        <select class="form-select" id="filterStatus" style="max-width:140px">
          <option value="">All statuses</option>
          <option value="draft">Drafts</option>
          <option value="published">Published</option>
        </select>
        <select class="form-select" id="filterSubject" style="max-width:140px">
          <option value="">All subjects</option>
          <option value="math">Math</option>
          <option value="science">Science</option>
          <option value="english">English</option>
        </select>
      </div>

      <div class="card">
        <div id="coursesBody">
          <div style="padding:2rem;text-align:center;color:var(--text-muted)">
            <div class="spinner" style="margin:0 auto 0.75rem"></div>Loading...
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- New Course Modal -->
<div class="modal-overlay" id="newCourseModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Create New Course</span>
      <button class="modal-close" onclick="document.getElementById('newCourseModal').classList.remove('active')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Course Title <span class="required">*</span></label>
        <input type="text" class="form-input" id="newCourseTitle" placeholder="e.g. Introduction to Pre-Algebra">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="newCourseDesc" rows="3" placeholder="What will students learn?"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Subject</label>
          <select class="form-select" id="newCourseSubject">
            <option value="math">Math</option>
            <option value="science">Science</option>
            <option value="english">English</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Grade Level</label>
          <input type="text" class="form-input" id="newCourseGrade" placeholder="e.g. Grade 6–8">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('newCourseModal').classList.remove('active')">Cancel</button>
      <button class="btn btn-primary" id="btnCreateCourse">Create Course</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="confirmDeleteModal">
  <div class="modal-box" style="max-width:380px">
    <div class="modal-header">
      <span class="modal-title" style="color:var(--danger)">Delete Course</span>
      <button class="modal-close" onclick="document.getElementById('confirmDeleteModal').classList.remove('active')">×</button>
    </div>
    <div class="confirm-dialog">
      <p>Delete "<strong id="deleteCourseTitle"></strong>"? This will permanently remove all lessons and questions. This cannot be undone.</p>
      <div style="display:flex;gap:0.75rem;justify-content:center">
        <button class="btn btn-ghost" onclick="document.getElementById('confirmDeleteModal').classList.remove('active')">Cancel</button>
        <button class="btn btn-danger" id="btnConfirmDelete">Delete Forever</button>
      </div>
    </div>
  </div>
</div>

<div class="staff-toast" id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../shared/firebase-auth.js"></script>
<script src="staff-auth.js"></script>
<script src="course-api.js"></script>
<script>
function showToast(msg, type='info', dur=3500) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, dur);
}
function escHtml(s) {
    return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let allCourses = [];
let deletingId = null;

async function initPage() {
    const ok = await staffAuth.checkAccess();
    if (!ok) return;
    document.getElementById('roleDisplay').innerHTML = `Signed in as &nbsp;${staffAuth.getRoleBadgeHTML()}`;
    await loadCourses();
}

async function loadCourses() {
    try {
        allCourses = await courseApi.listCourses();
        renderCourses();
    } catch (err) {
        document.getElementById('coursesBody').innerHTML =
            `<div style="padding:1.5rem;color:var(--danger)">Error: ${escHtml(err.message)}</div>`;
    }
}

function renderCourses() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const subject = document.getElementById('filterSubject').value;

    const filtered = allCourses.filter(c => {
        if (search && !c.title.toLowerCase().includes(search)) return false;
        if (status && c.status !== status) return false;
        if (subject && c.subject !== subject) return false;
        return true;
    });

    const body = document.getElementById('coursesBody');
    if (filtered.length === 0) {
        body.innerHTML = `<div class="empty-state">
            <div class="empty-state-icon">📚</div>
            <div class="empty-state-text">No courses found.</div>
        </div>`;
        return;
    }

    body.innerHTML = `<table class="staff-table">
        <thead><tr>
            <th>Title</th><th>Subject</th><th>Grade</th>
            <th>Status</th><th>Lessons</th><th>Updated</th><th></th>
        </tr></thead>
        <tbody>
        ${filtered.map(c => `<tr>
            <td style="color:var(--text-primary);font-weight:600">
                <a href="course-editor.html?courseId=${c.id}" style="color:inherit;text-decoration:none;hover:color:var(--accent)">${escHtml(c.title)}</a>
            </td>
            <td>${escHtml(c.subject||'–')}</td>
            <td>${escHtml(c.gradeLevel||'–')}</td>
            <td><span class="badge badge-${c.status||'draft'}">${c.status||'draft'}</span></td>
            <td>${c.lessonCount||0}</td>
            <td style="color:var(--text-muted)">${formatDate(c.updatedAt)}</td>
            <td><div class="row-actions">
                <a href="course-editor.html?courseId=${c.id}" class="btn btn-ghost btn-sm">Edit</a>
                ${staffAuth.isOwner() ? `<button class="btn btn-danger btn-sm" onclick="confirmDelete('${c.id}','${escHtml(c.title)}')">Del</button>` : ''}
            </div></td>
        </tr>`).join('')}
        </tbody>
    </table>`;
}

function formatDate(ts) {
    if (!ts) return '–';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function confirmDelete(id, title) {
    deletingId = id;
    document.getElementById('deleteCourseTitle').textContent = title;
    document.getElementById('confirmDeleteModal').classList.add('active');
}

document.getElementById('btnConfirmDelete')?.addEventListener('click', async () => {
    if (!deletingId) return;
    const btn = document.getElementById('btnConfirmDelete');
    btn.disabled = true; btn.textContent = 'Deleting...';
    try {
        await courseApi.deleteCourse(deletingId);
        document.getElementById('confirmDeleteModal').classList.remove('active');
        showToast('Course deleted.', 'success');
        deletingId = null;
        await loadCourses();
    } catch (err) {
        showToast('Delete failed: ' + err.message, 'error');
        btn.disabled = false; btn.textContent = 'Delete Forever';
    }
});

// Filters
document.getElementById('searchInput').addEventListener('input', renderCourses);
document.getElementById('filterStatus').addEventListener('change', renderCourses);
document.getElementById('filterSubject').addEventListener('change', renderCourses);

// New course
document.getElementById('btnNewCourse')?.addEventListener('click', () => {
    document.getElementById('newCourseModal').classList.add('active');
    document.getElementById('newCourseTitle').focus();
});
document.getElementById('btnCreateCourse')?.addEventListener('click', async () => {
    const title = document.getElementById('newCourseTitle').value.trim();
    if (!title) { showToast('Please enter a title.','error'); return; }
    const btn = document.getElementById('btnCreateCourse');
    btn.disabled = true; btn.textContent = 'Creating...';
    try {
        const id = await courseApi.createCourse({
            title,
            description: document.getElementById('newCourseDesc').value.trim(),
            subject: document.getElementById('newCourseSubject').value,
            gradeLevel: document.getElementById('newCourseGrade').value.trim()
        });
        window.location.href = `course-editor.html?courseId=${id}`;
    } catch (err) {
        showToast('Error: ' + err.message, 'error');
        btn.disabled = false; btn.textContent = 'Create Course';
    }
});

initPage();
</script>
</body>
</html>
